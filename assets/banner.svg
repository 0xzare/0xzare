<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071A12"/>
      <stop offset="0.55" stop-color="#0B2E1F"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="0.78" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#46E29B" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#46E29B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#46E29B"/>
      <stop offset="1" stop-color="#1F8A5D"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#46E29B" opacity="0.07"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sans { font-family: 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace; }
      .fade { opacity: 0; animation: fadeUp 0.9s ease-out forwards; }
      .d1 { animation-delay: 0.1s; }
      .d2 { animation-delay: 0.35s; }
      .d3 { animation-delay: 0.6s; }
      .d4 { animation-delay: 0.85s; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      .node { animation: pulse 3.2s ease-in-out infinite; }
      .p1 { animation-delay: 0s; } .p2 { animation-delay: 0.5s; } .p3 { animation-delay: 1s; }
      .p4 { animation-delay: 1.5s; } .p5 { animation-delay: 2s; } .p6 { animation-delay: 2.5s; }
      @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
      .edge { stroke-dasharray: 6 5; animation: flow 2.6s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -22; } }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .bar { transform-origin: 70px 148px; animation: grow 1.1s 0.5s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>
  <rect width="1200" height="320" fill="url(#glowbg)"/>

  <!-- neural network -->
  <g stroke="#2E9968" stroke-width="1.4" opacity="0.55">
    <line class="edge" x1="820" y1="90" x2="930" y2="60"/>
    <line class="edge" x1="930" y1="60" x2="1050" y2="95"/>
    <line class="edge" x1="820" y1="90" x2="880" y2="170"/>
    <line class="edge" x1="930" y1="60" x2="880" y2="170"/>
    <line class="edge" x1="930" y1="60" x2="1000" y2="160"/>
    <line class="edge" x1="1050" y1="95" x2="1000" y2="160"/>
    <line class="edge" x1="1050" y1="95" x2="1100" y2="190"/>
    <line class="edge" x1="880" y1="170" x2="1000" y2="160"/>
    <line class="edge" x1="880" y1="170" x2="840" y2="250"/>
    <line class="edge" x1="1000" y1="160" x2="960" y2="240"/>
    <line class="edge" x1="1000" y1="160" x2="1100" y2="190"/>
    <line class="edge" x1="1100" y1="190" x2="1070" y2="265"/>
    <line class="edge" x1="840" y1="250" x2="960" y2="240"/>
    <line class="edge" x1="960" y1="240" x2="1070" y2="265"/>
  </g>
  <g fill="#46E29B" filter="url(#glow)">
    <circle class="node p1" cx="820" cy="90" r="7"/>
    <circle class="node p3" cx="930" cy="60" r="9"/>
    <circle class="node p5" cx="1050" cy="95" r="6"/>
    <circle class="node p2" cx="880" cy="170" r="8"/>
    <circle class="node p6" cx="1000" cy="160" r="10"/>
    <circle class="node p4" cx="1100" cy="190" r="6"/>
    <circle class="node p3" cx="840" cy="250" r="7"/>
    <circle class="node p1" cx="960" cy="240" r="8"/>
    <circle class="node p5" cx="1070" cy="265" r="6"/>
  </g>
  <circle cx="975" cy="160" r="130" stroke="#46E29B" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="975" cy="160" r="165" stroke="#46E29B" stroke-opacity="0.07" stroke-width="1"/>

  <!-- text -->
  <text class="sans fade d1" x="70" y="122" font-size="54" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Ali Zareshahi</text>
  <rect class="bar" x="70" y="140" width="150" height="5" rx="2.5" fill="url(#accent)"/>
  <text class="sans fade d2" x="70" y="188" font-size="24" font-weight="600" fill="#7EE2A8">AI Developer · RAG &amp; Agentic Systems Specialist</text>
  <text class="sans fade d3" x="70" y="224" font-size="17" fill="#A9BDB0">Python · LLMs · Vector Search · NLP · Geospatial AI</text>
  <g class="fade d4">
    <text class="mono" x="70" y="266" font-size="15" fill="#7EE2A8">&gt; building systems that retrieve, reason &amp; act</text>
    <text class="mono cursor" x="482" y="266" font-size="15" fill="#46E29B">_</text>
  </g>

  <!-- bottom accent line -->
  <rect x="0" y="314" width="1200" height="6" fill="url(#accent)" opacity="0.85"/>
</svg>
